name: CMake

on:
  push:
    branches: [ main, feat/** ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
            preset: ci-linux
            build-preset: ci-linux
            build-dir: out/build/ci-linux
            install-dir: out/install/ci-linux
          - os: ubuntu-latest
            name: linux-cross-windows-mingw
            preset: ci-linux-cross-windows-mingw
            build-preset: ci-linux-cross-windows-mingw
            build-dir: out/build/ci-linux-cross-windows-mingw
            install-dir: out/install/ci-linux-cross-windows-mingw
          - os: windows-2022
            name: windows-msvc
            preset: ci-windows-msvc
            build-preset: ci-windows-msvc
            build-dir: out/build/ci-windows-msvc
            install-dir: out/install/ci-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v5

    - name: Ubuntu audio backend dependency
      if: matrix.name == 'linux'
      run: |
        sudo apt-get update
        sudo apt-get install --yes libasound2-dev

    - name: Ubuntu MinGW-w64 cross toolchain
      if: matrix.name == 'linux-cross-windows-mingw'
      run: |
        sudo apt-get update
        sudo apt-get install --yes gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64 binutils-mingw-w64-x86-64

    - name: Configure CMake
      run: cmake --preset ${{ matrix.preset }}

    - name: Build
      run: cmake --build --preset ${{ matrix.build-preset }} --config ${{ env.BUILD_TYPE }}

    - name: Install
      run: cmake --install ${{ matrix.build-dir }} --config ${{ env.BUILD_TYPE }} --prefix ${{ github.workspace }}/${{ matrix.install-dir }}
      
